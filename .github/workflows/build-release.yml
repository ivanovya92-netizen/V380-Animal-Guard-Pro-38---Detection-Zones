name: Build V380 Animal Guard Pro 38 Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Android project
        id: prep
        shell: bash
        run: |
          set -e
          echo "Repository root:"
          pwd
          echo "Root files:"
          ls -la

          PROJECT_DIR=""

          # Case 1: project is already uploaded/extracted directly in the repo root
          if [ -d "app" ] && [ -f "settings.gradle" ] && [ -f "app/build.gradle" ]; then
            echo "Detected direct Android project at repo root."
            PROJECT_DIR="."
          fi

          # Case 2: source zip is uploaded in repo root
          if [ -z "$PROJECT_DIR" ] && [ -f "V380AnimalGuardPro38_Source.zip" ]; then
            echo "Detected V380AnimalGuardPro38_Source.zip in repo root."
            rm -rf build-src
            mkdir -p build-src
            unzip -q "V380AnimalGuardPro38_Source.zip" -d build-src
            PROJECT_DIR="build-src"
          fi

          # Case 3: GitHubSafePack zip is uploaded; unpack it and then unpack source zip inside it
          if [ -z "$PROJECT_DIR" ]; then
            SAFE_PACK="$(find . -maxdepth 3 -type f -name 'V380AnimalGuardPro38_GitHubSafePack*.zip' | head -n 1 || true)"
            if [ -n "$SAFE_PACK" ]; then
              echo "Detected safe pack: $SAFE_PACK"
              rm -rf unpack-safe build-src
              mkdir -p unpack-safe build-src
              unzip -q "$SAFE_PACK" -d unpack-safe
              SOURCE_ZIP="$(find unpack-safe -type f -name 'V380AnimalGuardPro38_Source.zip' | head -n 1 || true)"
              if [ -n "$SOURCE_ZIP" ]; then
                echo "Detected source zip inside safe pack: $SOURCE_ZIP"
                unzip -q "$SOURCE_ZIP" -d build-src
                PROJECT_DIR="build-src"
              fi
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Cannot locate Android project."
            echo "Expected either:"
            echo "1) repo root contains app/, settings.gradle and app/build.gradle"
            echo "2) V380AnimalGuardPro38_Source.zip exists in repo root"
            echo "3) V380AnimalGuardPro38_GitHubSafePack.zip exists and contains the source zip"
            find . -maxdepth 5 -type f | sort
            exit 9
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using PROJECT_DIR=$PROJECT_DIR"
          test -d "$PROJECT_DIR/app"
          test -f "$PROJECT_DIR/settings.gradle"
          test -f "$PROJECT_DIR/app/build.gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build signed release APK
        run: gradle -p "$PROJECT_DIR" assembleRelease --no-daemon --stacktrace

      - name: Rename APK and show size
        run: |
          mkdir -p output
          cp "$PROJECT_DIR/app/build/outputs/apk/release/app-release.apk" output/V380AnimalGuardPro38-release.apk
          ls -lh output/V380AnimalGuardPro38-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: V380AnimalGuardPro38-release-apk
          path: output/V380AnimalGuardPro38-release.apk
