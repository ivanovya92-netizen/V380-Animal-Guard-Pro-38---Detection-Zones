name: Build V380 Animal Guard Pro 38 Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Unpack Android project safely
        shell: bash
        run: |
          set -e
          echo "Repository root:"
          pwd
          echo "Root files:"
          ls -la
          rm -rf build-src unpack-safe
          mkdir -p build-src unpack-safe
          SOURCE_ZIP=""

          if [ -f "V380AnimalGuardPro38_Source.zip" ]; then
            SOURCE_ZIP="V380AnimalGuardPro38_Source.zip"
          fi

          if [ -z "$SOURCE_ZIP" ]; then
            SAFE_PACK="$(find . -maxdepth 3 -type f -name 'V380AnimalGuardPro38_GitHubSafePack*.zip' | head -n 1 || true)"
            if [ -n "$SAFE_PACK" ]; then
              echo "Found safe pack: $SAFE_PACK"
              unzip -q "$SAFE_PACK" -d unpack-safe
              SOURCE_ZIP="$(find unpack-safe -type f -name 'V380AnimalGuardPro38_Source.zip' | head -n 1 || true)"
            fi
          fi

          if [ -z "$SOURCE_ZIP" ]; then
            SOURCE_ZIP="$(find . -maxdepth 5 -type f -name 'V380AnimalGuardPro38_Source.zip' | head -n 1 || true)"
          fi

          if [ -z "$SOURCE_ZIP" ]; then
            echo "ERROR: Cannot find V380AnimalGuardPro38_Source.zip"
            find . -maxdepth 5 -type f | sort
            exit 9
          fi

          echo "Using source zip: $SOURCE_ZIP"
          unzip -q "$SOURCE_ZIP" -d build-src
          ls -la build-src
          test -d build-src/app
          test -f build-src/settings.gradle
          test -f build-src/app/build.gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build signed release APK
        working-directory: build-src
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Rename APK and show size
        run: |
          mkdir -p output
          cp build-src/app/build/outputs/apk/release/app-release.apk output/V380AnimalGuardPro38-release.apk
          ls -lh output/V380AnimalGuardPro38-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v7
        with:
          name: V380AnimalGuardPro38-release-apk
          path: output/V380AnimalGuardPro38-release.apk
